<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Connector</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Новое overlay для выбора входа или регистрации -->
  <div id="loginChoiceOverlay" class="overlay">
    <div class="auth-box">
      <h2>Добро пожаловать</h2>
      <button onclick="openLogin()">Вход</button>
      <button onclick="openRegister()">Регистрация</button>
    </div>
  </div>

  <!-- Overlay для входа -->
  <div id="loginOverlay" class="overlay hidden">
    <div class="auth-box">
      <h2>Вход</h2>
      <input type="text" id="loginUsername" placeholder="Логин">
      <input type="password" id="loginPassword" placeholder="Пароль">
      <button onclick="login()">Войти</button>
      <p id="loginMessage"></p>
      <button onclick="closeLogin()">Назад</button>
    </div>
  </div>

  <!-- Overlay для регистрации -->
  <div id="registerOverlay" class="overlay hidden">
    <div class="auth-box">
      <h2>Регистрация</h2>
      <input type="text" id="username" placeholder="Логин">
      <input type="password" id="password" placeholder="Пароль">
      <button onclick="register()">Зарегистрироваться</button>
      <p id="authMessage"></p>
      <button onclick="closeRegister()">Назад</button>
    </div>
  </div>

  <!-- Меню паузы (только Пауза и Продолжить) -->
  <div id="pauseOverlay" class="overlay hidden">
    <div class="pause-menu">
      <h2 id="pause">Пауза</h2>
      <button id="resumeBtn">Продолжить</button>
    </div>
  </div>

  <header>
    <h1>Word Connector</h1>
  </header>

  <main>
    <p id="message"></p>
    <p style="position: absolute"><span id="time" style="background-color: #6f3131; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-right: 10px;">Время:</span> <span id="timer">0</span> сек</p>
    <div class="grid" id="grid"></div>
    <p ><span id="WordsForSearch" style="background-color: #6f3131; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-right: 10px; position:absolute; top: 357px">Слова для поиска:</span> <span id="words"></span></p>
    <button id="pauseBtn" style="background-color: #6f3131; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-right: 10px; position:absolute; top: 126px">Пауза</button>
  </main>

  <!-- Блок с селекторами и кнопками -->
  <div style="margin-top: 20px; padding: 20px; background-color: #f5f5f5; border-radius: 5px;">
    <div style="margin-bottom: 10px;">
      <label for="langSelect" style="margin-right: 10px;" id="langLabel">Язык:</label>
      <select id="langSelect">
        <option value="ru">RU</option>
        <option value="en">EN</option>
        <option value="he">HE</option>
      </select>

      <label for="difficultySelect" style="margin-left: 20px; margin-right: 10px;" id="difficultyLabel">Сложность:</label>
      <select id="difficultySelect">
        <option value="easy" id="opt-easy">Лёгкий</option>
        <option value="medium" id="opt-medium">Средний</option>
        <option value="hard" id="opt-hard">Сложный</option>
      </select>
    </div>

    <div>
      <button id="startBtn" style="background-color: #6f3131; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-right: 10px;">Генерировать уровень</button>
      <button id="playLevelsBtn" style="background-color: #6f3131; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-right: 10px;">Играть уровни</button>
      <button id="saveLevelBtn" style="background-color: #6f3131; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">💾 Сохранить уровень</button>
    </div>
  </div>

  <script src="WordConnector.js"></script>
</body>

</html>
